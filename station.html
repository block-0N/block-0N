<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主要站点信息合集</title>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 class="page-title">主要站点信息合集</h1>
    <ul class="bus-list" id="busList"></ul>
    <script src="./stationinfo.js"></script>
    <script>
        const base = './stationinfo/';
        const listDom = document.getElementById('busList');
        listDom.innerHTML = '';

        // 中文排序
        const files = siteNames.sort((a, b) => a.localeCompare(b, 'zh-CN')).map(name => name + '.html');

        files.forEach(f => {
            const li = document.createElement('li');
            li.className = 'bus-item';
            const a = document.createElement('a');
            a.className = 'bus-link';
            a.href = base + f;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = f.replace('.html', '');
            li.appendChild(a);
            listDom.appendChild(li);
        })
    </script>
</body>

</html>
